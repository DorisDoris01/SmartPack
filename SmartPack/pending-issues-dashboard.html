<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartPack — Issue Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root {
  --bg: #0c0e12;
  --surface: #13161c;
  --surface-2: #1a1e26;
  --surface-3: #222730;
  --border: #2a2f3a;
  --border-subtle: #1e2230;
  --text: #e8eaf0;
  --text-2: #9ba1b0;
  --text-3: #636980;
  --accent: #34d399;
  --accent-dim: rgba(52,211,153,0.12);
  --accent-glow: rgba(52,211,153,0.25);
  --critical: #f43f5e;
  --critical-dim: rgba(244,63,94,0.12);
  --high: #f97316;
  --high-dim: rgba(249,115,22,0.12);
  --medium: #eab308;
  --medium-dim: rgba(234,179,8,0.10);
  --low: #6366f1;
  --low-dim: rgba(99,102,241,0.12);
  --fixed: #34d399;
  --fixed-dim: rgba(52,211,153,0.10);
  --radius: 12px;
  --radius-sm: 8px;
  --font: 'Outfit', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

html { font-size: 15px; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* Subtle grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    linear-gradient(rgba(52,211,153,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(52,211,153,0.015) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}

.app { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 2rem 2.5rem 4rem; }

/* ============ HEADER ============ */
.header { margin-bottom: 2.5rem; }
.header-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
.header h1 {
  font-size: 2rem;
  font-weight: 800;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header .subtitle {
  font-size: 0.85rem;
  color: var(--text-3);
  margin-top: 0.3rem;
  font-family: var(--mono);
  font-weight: 400;
}
.header-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.4rem 0.9rem;
  background: var(--accent-dim);
  border: 1px solid rgba(52,211,153,0.2);
  border-radius: 100px;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--accent);
  font-family: var(--mono);
}
.header-badge .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* ============ STAT CARDS ============ */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 1rem;
  margin-bottom: 2rem;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  padding: 1.25rem 1.4rem;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s, transform 0.15s;
}
.stat-card:hover {
  border-color: var(--border);
  transform: translateY(-1px);
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
}
.stat-card.total::before { background: linear-gradient(90deg, var(--accent), transparent); }
.stat-card.fixed::before { background: linear-gradient(90deg, var(--fixed), transparent); }
.stat-card.pending::before { background: linear-gradient(90deg, var(--high), transparent); }
.stat-card.critical::before { background: linear-gradient(90deg, var(--critical), transparent); }
.stat-card.high-card::before { background: linear-gradient(90deg, var(--high), transparent); }
.stat-card.medium-card::before { background: linear-gradient(90deg, var(--medium), transparent); }
.stat-card .stat-label {
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-3);
  margin-bottom: 0.5rem;
}
.stat-card .stat-value {
  font-size: 2.2rem;
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 1;
  font-family: var(--mono);
}
.stat-card.total .stat-value { color: var(--text); }
.stat-card.fixed .stat-value { color: var(--accent); }
.stat-card.pending .stat-value { color: var(--high); }
.stat-card.critical .stat-value { color: var(--critical); }
.stat-card.high-card .stat-value { color: var(--high); }
.stat-card.medium-card .stat-value { color: var(--medium); }
.stat-card .stat-sub {
  font-size: 0.72rem;
  color: var(--text-3);
  margin-top: 0.4rem;
  font-family: var(--mono);
}

/* ============ TWO-COL LAYOUT ============ */
.dashboard-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
  margin-bottom: 1.5rem;
}
@media (max-width: 900px) { .dashboard-row { grid-template-columns: 1fr; } }

/* ============ PANELS ============ */
.panel {
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  padding: 1.5rem;
}
.panel-title {
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-3);
  margin-bottom: 1.2rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.panel-title .icon { font-size: 0.9rem; }

/* ============ SEVERITY DONUT ============ */
.donut-container {
  display: flex;
  align-items: center;
  gap: 2rem;
}
.donut-wrap { position: relative; width: 160px; height: 160px; flex-shrink: 0; }
.donut-center {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  text-align: center;
}
.donut-center .num { font-size: 1.8rem; font-weight: 800; font-family: var(--mono); letter-spacing: -0.04em; }
.donut-center .lbl { font-size: 0.65rem; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; }
.donut-legend { display: flex; flex-direction: column; gap: 0.7rem; flex: 1; }
.legend-item {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  font-size: 0.82rem;
}
.legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
.legend-count { margin-left: auto; font-family: var(--mono); font-weight: 600; font-size: 0.82rem; color: var(--text-2); }

/* ============ CATEGORY BARS ============ */
.cat-bars { display: flex; flex-direction: column; gap: 1rem; }
.cat-bar-item {}
.cat-bar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.4rem; }
.cat-bar-label { font-size: 0.82rem; font-weight: 500; }
.cat-bar-count { font-size: 0.75rem; font-family: var(--mono); color: var(--text-3); }
.cat-bar-track {
  width: 100%;
  height: 8px;
  background: var(--surface-3);
  border-radius: 100px;
  overflow: hidden;
  display: flex;
}
.cat-bar-fill {
  height: 100%;
  border-radius: 100px;
  transition: width 1s cubic-bezier(0.16,1,0.3,1);
}

/* ============ PHASE ROADMAP ============ */
.roadmap { margin-bottom: 1.5rem; }
.phase-list { display: flex; flex-direction: column; gap: 0.75rem; }
.phase-card {
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  padding: 1.1rem 1.4rem;
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 1.2rem;
  transition: border-color 0.2s;
  cursor: default;
}
.phase-card:hover { border-color: var(--border); }
.phase-num {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-weight: 700;
  font-size: 0.85rem;
}
.phase-num.p1 { background: var(--critical-dim); color: var(--critical); }
.phase-num.p2 { background: var(--medium-dim); color: var(--medium); }
.phase-num.p3 { background: var(--low-dim); color: var(--low); }
.phase-num.p4 { background: rgba(100,116,139,0.12); color: #94a3b8; }
.phase-info h3 { font-size: 0.92rem; font-weight: 600; letter-spacing: -0.01em; }
.phase-info .phase-desc { font-size: 0.75rem; color: var(--text-3); margin-top: 0.15rem; }
.phase-progress { display: flex; align-items: center; gap: 0.7rem; }
.phase-bar-track {
  width: 100px; height: 6px;
  background: var(--surface-3);
  border-radius: 100px;
  overflow: hidden;
}
.phase-bar-fill { height: 100%; border-radius: 100px; background: var(--accent); transition: width 1s ease; }
.phase-frac { font-family: var(--mono); font-size: 0.78rem; color: var(--text-2); white-space: nowrap; }

/* ============ ISSUE TABLE ============ */
.issues-section { margin-top: 0rem; }
.issues-toolbar {
  display: flex;
  gap: 0.75rem;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 1rem;
}
.search-box {
  flex: 1;
  min-width: 200px;
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  padding: 0.6rem 1rem;
  color: var(--text);
  font-family: var(--font);
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.2s;
}
.search-box::placeholder { color: var(--text-3); }
.search-box:focus { border-color: var(--accent); }

.filter-group { display: flex; gap: 0.35rem; }
.filter-btn {
  padding: 0.45rem 0.8rem;
  border: 1px solid var(--border-subtle);
  border-radius: 100px;
  background: transparent;
  color: var(--text-3);
  font-family: var(--font);
  font-size: 0.75rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.filter-btn:hover { border-color: var(--border); color: var(--text-2); }
.filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.filter-btn.active-critical { border-color: var(--critical); color: var(--critical); background: var(--critical-dim); }
.filter-btn.active-high { border-color: var(--high); color: var(--high); background: var(--high-dim); }
.filter-btn.active-medium { border-color: var(--medium); color: var(--medium); background: var(--medium-dim); }
.filter-btn.active-low { border-color: var(--low); color: var(--low); background: var(--low-dim); }
.filter-btn.active-fixed { border-color: var(--fixed); color: var(--fixed); background: var(--fixed-dim); }

.issue-count-label {
  font-size: 0.75rem;
  color: var(--text-3);
  font-family: var(--mono);
  margin-left: auto;
}

.issues-list { display: flex; flex-direction: column; gap: 0.5rem; }

.issue-row {
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color 0.15s;
}
.issue-row:hover { border-color: var(--border); }
.issue-row.expanded { border-color: var(--accent); }
.issue-row.is-fixed { opacity: 0.6; }
.issue-row.is-fixed:hover { opacity: 0.85; }

.issue-header {
  display: grid;
  grid-template-columns: 56px 80px 1fr auto auto;
  align-items: center;
  gap: 0.8rem;
  padding: 0.85rem 1.2rem;
  cursor: pointer;
  user-select: none;
}
@media (max-width: 700px) {
  .issue-header { grid-template-columns: 50px 70px 1fr auto; }
  .issue-header .issue-file { display: none; }
}

.issue-id {
  font-family: var(--mono);
  font-weight: 700;
  font-size: 0.82rem;
}
.severity-badge {
  padding: 0.2rem 0.55rem;
  border-radius: 100px;
  font-size: 0.68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  text-align: center;
  white-space: nowrap;
}
.severity-badge.critical { background: var(--critical-dim); color: var(--critical); }
.severity-badge.high { background: var(--high-dim); color: var(--high); }
.severity-badge.medium { background: var(--medium-dim); color: var(--medium); }
.severity-badge.low { background: var(--low-dim); color: var(--low); }
.severity-badge.fixed { background: var(--fixed-dim); color: var(--fixed); }

.issue-title { font-size: 0.85rem; font-weight: 500; line-height: 1.35; }
.issue-title .fixed-tag {
  display: inline-block;
  margin-left: 0.4rem;
  padding: 0.1rem 0.45rem;
  background: var(--fixed-dim);
  color: var(--accent);
  font-size: 0.65rem;
  font-weight: 700;
  border-radius: 4px;
  vertical-align: middle;
  letter-spacing: 0.03em;
}
.issue-file {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text-3);
  text-align: right;
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.issue-chevron {
  width: 20px;
  text-align: center;
  color: var(--text-3);
  font-size: 0.7rem;
  transition: transform 0.2s;
}
.issue-row.expanded .issue-chevron { transform: rotate(90deg); }

.issue-detail {
  display: none;
  padding: 0 1.2rem 1.2rem;
  border-top: 1px solid var(--border-subtle);
}
.issue-row.expanded .issue-detail { display: block; }

.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-top: 1rem;
}
@media (max-width: 700px) { .detail-grid { grid-template-columns: 1fr; } }

.detail-block {}
.detail-block h4 {
  font-size: 0.68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--accent);
  margin-bottom: 0.5rem;
}
.detail-block p {
  font-size: 0.82rem;
  line-height: 1.55;
  color: var(--text-2);
}
.detail-block code {
  font-family: var(--mono);
  font-size: 0.78rem;
  background: var(--surface-3);
  padding: 0.15rem 0.4rem;
  border-radius: 4px;
  color: var(--accent);
}
.detail-meta {
  display: flex;
  gap: 1rem;
  margin-top: 0.8rem;
  flex-wrap: wrap;
}
.detail-chip {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  padding: 0.25rem 0.6rem;
  border-radius: 100px;
  background: var(--surface-3);
  font-size: 0.7rem;
  color: var(--text-2);
  font-family: var(--mono);
}

/* ============ EMPTY STATE ============ */
.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-3);
  font-size: 0.9rem;
}

/* ============ ANIMATIONS ============ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.animate-in { animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both; }
.d1 { animation-delay: 0.05s; } .d2 { animation-delay: 0.1s; } .d3 { animation-delay: 0.15s; }
.d4 { animation-delay: 0.2s; } .d5 { animation-delay: 0.25s; } .d6 { animation-delay: 0.3s; }
.d7 { animation-delay: 0.35s; } .d8 { animation-delay: 0.4s; }
</style>
</head>
<body>
<div class="app">

<!-- HEADER -->
<div class="header animate-in d1">
  <div class="header-row">
    <div>
      <h1>SmartPack Issue Tracker</h1>
      <div class="subtitle">pending-issues-guide.md &mdash; updated 2026-03-03</div>
    </div>
    <div class="header-badge"><span class="dot"></span>19 / 68 resolved</div>
  </div>
</div>

<!-- STATS -->
<div class="stats-grid animate-in d2" id="statsGrid"></div>

<!-- TWO COL: DONUT + CATEGORY -->
<div class="dashboard-row animate-in d3">
  <div class="panel">
    <div class="panel-title"><span class="icon">&#9679;</span> Severity Breakdown (Pending)</div>
    <div class="donut-container">
      <div class="donut-wrap"><canvas id="donutCanvas" width="160" height="160"></canvas>
        <div class="donut-center"><div class="num">50</div><div class="lbl">Pending</div></div>
      </div>
      <div class="donut-legend" id="donutLegend"></div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-title"><span class="icon">&#9632;</span> By Category</div>
    <div class="cat-bars" id="catBars"></div>
  </div>
</div>

<!-- PHASE ROADMAP -->
<div class="roadmap animate-in d4">
  <div class="panel">
    <div class="panel-title"><span class="icon">&#9654;</span> Fix Roadmap</div>
    <div class="phase-list" id="phaseList"></div>
  </div>
</div>

<!-- ISSUES TABLE -->
<div class="issues-section animate-in d5">
  <div class="panel" style="padding-bottom:0.5rem;">
    <div class="panel-title"><span class="icon">&#9776;</span> All Issues</div>
    <div class="issues-toolbar">
      <input class="search-box" id="searchBox" placeholder="Search issues by ID, title, file..." />
      <div class="filter-group" id="severityFilters"></div>
      <div class="filter-group" id="statusFilters"></div>
      <span class="issue-count-label" id="issueCount"></span>
    </div>
    <div class="issues-list" id="issuesList"></div>
    <div style="height:1rem;"></div>
  </div>
</div>

</div>

<script>
// ============ DATA ============

const ISSUES = [
  // CRITICAL
  { id:'F5', severity:'critical', status:'fixed', title:'Zero Test Coverage', file:'SmartPackTests/', source:'Code Bugs', phase:1,
    technical:'The project had no XCTest target. No unit tests, integration tests, or UI tests existed for any component.',
    plain:'There was no automated way to check if something breaks when you change code. Every bug was only caught by manual testing.',
    fix:'Added SmartPackTests target with 6 test files: TripTests, TripDateRangeTests, WeatherForecastTests, PresetDataTests, CustomItemManagerTests, TestModelContainer. All tests pass.' },

  // HIGH
  { id:'F6', severity:'high', status:'pending', title:'PackingActivityManager.endActivity() Race Condition', file:'Activity/PackingActivityManager.swift:90-102', source:'Code Bugs', phase:1,
    technical:'endActivity() launches a Task to call activity.end(...) then immediately sets currentActivity = nil. If startActivity is called in between, a new activity starts while the old one hasn\'t ended. No synchronization on currentActivity.',
    plain:'When the app ends a Live Activity, it doesn\'t wait for the old one to shut down before allowing a new one. This causes ghost Live Activities stuck on the lock screen.',
    fix:'Make PackingActivityManager an actor or add @MainActor isolation.' },
  { id:'F9', severity:'high', status:'fixed', title:'UIScreen.main.bounds Deprecated + Wrong on iPad', file:'Components/PackingList/CelebrationOverlay.swift:71,108,115', source:'Code Bugs', phase:1,
    technical:'UIScreen.main.bounds was deprecated in iOS 16. On iPad with Split View/Slide Over/Stage Manager, it returns full physical screen size, not the app window size.',
    plain:'The confetti animation uses the whole screen size instead of the app window. On iPad split-screen, confetti flies to wrong positions.',
    fix:'Replaced all UIScreen.main.bounds with GeometryReader. Confetti x-positions stored as fractions (0...1), resolved to actual view bounds.' },
  { id:'F10', severity:'high', status:'fixed', title:'checkedItemCount / totalItemCount Can Drift Out of Sync', file:'Models/Trip.swift:146-178', source:'Code Bugs', phase:1,
    technical:'Counters maintained incrementally could go stale if TripItem.isChecked is mutated directly. No max(0,...) bounds — counters could go negative.',
    plain:'The "X out of Y items packed" tally could get wrong if any code changes items directly. You might see "5 out of 3 items packed."',
    fix:'Added max(0,...) bounds to toggleItem() and removeItem(). Added recalculateCounts() safety net in PackingListViewModel.init().' },
  { id:'F12', severity:'high', status:'fixed', title:'PackingListViewModel Missing @MainActor', file:'ViewModels/PackingListViewModel.swift', source:'Code Bugs', phase:1,
    technical:'@Observable class without @MainActor holds and mutates a SwiftData @Model (main-actor-isolated). No compiler enforcement. Will fail under Swift 6 strict concurrency.',
    plain:'The ViewModel isn\'t marked "must run on main thread." Works by coincidence now but could crash from background callers and won\'t compile under future Swift.',
    fix:'Added @MainActor to the class declaration.' },
  { id:'F13', severity:'high', status:'fixed', title:'hasCompletedOnboarding Setter Doesn\'t Trigger @Published', file:'Localization/LocalizationManager.swift:80-83', source:'Code Bugs', phase:1,
    technical:'Computed property backed by UserDefaults, not @Published. Setting it doesn\'t fire objectWillChange. WelcomeView wrote directly to UserDefaults, bypassing the property.',
    plain:'The onboarding flag was coded so that screens watching it wouldn\'t notice when it changed. The welcome screen also bypassed it entirely.',
    fix:'Converted to @Published with didSet sync. Updated WelcomeView to write through the property.' },
  { id:'A1', severity:'high', status:'pending', title:'HomeView Animations Don\'t Respect prefers-reduced-motion', file:'Components/Trip/TripRowView.swift, Views/Main/HomeView.swift', source:'HomeView UX', phase:1,
    technical:'Ring progress animation and empty-state entrance never check @Environment(\\.accessibilityReduceMotion). Users with Reduce Motion still see all animations.',
    plain:'People who turn on "Reduce Motion" for motion sickness still see all animations on the home screen. This is an accessibility failure.',
    fix:'Add @Environment(\\.accessibilityReduceMotion) and wrap animations conditionally.' },
  { id:'PA1', severity:'high', status:'pending', title:'PackingListView Animations Don\'t Respect prefers-reduced-motion', file:'ProgressHeader, ItemRow, CategorySection, CelebrationOverlay', source:'PackingListView UX', phase:1,
    technical:'Four animation sites — progress bar, checkbox bounce, category expand, celebration overlay — all ignore accessibilityReduceMotion. WCAG 2.1 SC 2.3.3 violation.',
    plain:'Same as A1 for the packing list screen. Progress bar, checkboxes, categories, and confetti all animate regardless of Reduce Motion.',

const severityOrder = { critical: 0, high: 1, medium: 2, low: 3 };
const severityColors = { critical:'#f43f5e', high:'#f97316', medium:'#eab308', low:'#6366f1', fixed:'#34d399' };

// Stats
function renderStats() {
  const total = ISSUES.length;
  const fixed = ISSUES.filter(i => i.status === 'fixed').length;
  const pending = total - fixed;
  const pendCrit = ISSUES.filter(i => i.status !== 'fixed' && i.severity === 'critical').length;
  const pendHigh = ISSUES.filter(i => i.status !== 'fixed' && i.severity === 'high').length;
  const pendMed = ISSUES.filter(i => i.status !== 'fixed' && i.severity === 'medium').length;

  const cards = [
    { cls: 'total', label: 'Total Issues', value: total, sub: '4 audit sources' },
    { cls: 'fixed', label: 'Fixed', value: fixed, sub: `${((fixed/total)*100).toFixed(0)}% resolved` },
    { cls: 'pending', label: 'Pending', value: pending, sub: `${pendCrit} critical, ${pendHigh} high` },
    { cls: 'critical', label: 'Critical', value: pendCrit, sub: 'Ship-blockers' },
    { cls: 'high-card', label: 'High', value: pendHigh, sub: 'Accessibility + races' },
    { cls: 'medium-card', label: 'Medium', value: pendMed, sub: 'Quality + polish' },
  ];
  document.getElementById('statsGrid').innerHTML = cards.map(c => `
    <div class="stat-card ${c.cls}">
      <div class="stat-label">${c.label}</div>
      <div class="stat-value">${c.value}</div>
      <div class="stat-sub">${c.sub}</div>
    </div>`).join('');
}

// Donut
function renderDonut() {
  const canvas = document.getElementById('donutCanvas');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = 160 * dpr; canvas.height = 160 * dpr;
  canvas.style.width = '160px'; canvas.style.height = '160px';
  ctx.scale(dpr, dpr);

  const pending = ISSUES.filter(i => i.status !== 'fixed');
  const counts = { critical: 0, high: 0, medium: 0, low: 0 };
  pending.forEach(i => counts[i.severity]++);
  const total = pending.length;
  const slices = [
    { key: 'critical', label: 'Critical', count: counts.critical, color: severityColors.critical },
    { key: 'high', label: 'High', count: counts.high, color: severityColors.high },
    { key: 'medium', label: 'Medium', count: counts.medium, color: severityColors.medium },
    { key: 'low', label: 'Low', count: counts.low, color: severityColors.low },
  ];

  const cx = 80, cy = 80, r = 62, lw = 18;
  let startAngle = -Math.PI / 2;
  const gap = 0.04;

  slices.forEach(s => {
    if (s.count === 0) return;
    const sweep = (s.count / total) * (2 * Math.PI) - gap;
    ctx.beginPath();
    ctx.arc(cx, cy, r, startAngle + gap/2, startAngle + sweep + gap/2, false);
    ctx.strokeStyle = s.color;
    ctx.lineWidth = lw;
    ctx.lineCap = 'round';
    ctx.stroke();
    startAngle += sweep + gap;
  });

  document.getElementById('donutLegend').innerHTML = slices.map(s => `
    <div class="legend-item">
      <span class="legend-dot" style="background:${s.color}"></span>
      <span>${s.label}</span>
      <span class="legend-count">${s.count}</span>
    </div>`).join('');
}

// Filters
let activeSeverity = 'all';
let activeStatus = 'all';
let searchQuery = '';

function renderFilters() {
  const sevBtns = [
    { key:'all', label:'All' },
    { key:'critical', label:'Critical' },
    { key:'high', label:'High' },
    { key:'medium', label:'Medium' },
    { key:'low', label:'Low' },
  ];
  document.getElementById('severityFilters').innerHTML = sevBtns.map(b => {
    const isActive = activeSeverity === b.key;
    const cls = isActive ? (b.key === 'all' ? 'active' : `active-${b.key}`) : '';
    return `<button class="filter-btn ${cls}" data-sev="${b.key}">${b.label}</button>`;
  }).join('');

  const stBtns = [
    { key:'all', label:'All Status' },
    { key:'pending', label:'Pending' },
    { key:'fixed', label:'Fixed' },
  ];
  document.getElementById('statusFilters').innerHTML = stBtns.map(b => {
    const isActive = activeStatus === b.key;
    const cls = isActive ? (b.key === 'fixed' ? 'active-fixed' : 'active') : '';
    return `<button class="filter-btn ${cls}" data-st="${b.key}">${b.label}</button>`;
  }).join('');

  document.querySelectorAll('[data-sev]').forEach(btn => {
    btn.onclick = () => { activeSeverity = btn.dataset.sev; renderFilters(); renderIssues(); };
  });
  document.querySelectorAll('[data-st]').forEach(btn => {
    btn.onclick = () => { activeStatus = btn.dataset.st; renderFilters(); renderIssues(); };
  });
}

function renderIssues() {
  const q = searchQuery.toLowerCase();
  const filtered = ISSUES.filter(i => {
    if (activeSeverity !== 'all' && i.severity !== activeSeverity) return false;
    if (activeStatus !== 'all' && i.status !== activeStatus) return false;
    if (q && !(
      i.id.toLowerCase().includes(q) ||
      i.title.toLowerCase().includes(q) ||
      i.file.toLowerCase().includes(q) ||
      i.source.toLowerCase().includes(q)
    )) return false;
    return true;
  }).sort((a, b) => {
    if (a.status === 'fixed' && b.status !== 'fixed') return 1;
    if (a.status !== 'fixed' && b.status === 'fixed') return -1;
    return severityOrder[a.severity] - severityOrder[b.severity];
  });

  document.getElementById('issueCount').textContent = `${filtered.length} issue${filtered.length !== 1 ? 's' : ''}`;

  if (filtered.length === 0) {
    document.getElementById('issuesList').innerHTML = '<div class="empty-state">No issues match your filters.</div>';
    return;
  }

  document.getElementById('issuesList').innerHTML = filtered.map(i => {
    const sevCls = i.status === 'fixed' ? 'fixed' : i.severity;
    const sevLabel = i.status === 'fixed' ? 'Fixed' : i.severity;
    const fixedTag = i.status === 'fixed' ? '<span class="fixed-tag">FIXED</span>' : '';
    return `
    <div class="issue-row ${i.status === 'fixed' ? 'is-fixed' : ''}" data-id="${i.id}">
      <div class="issue-header" onclick="toggleIssue('${i.id}')">
        <span class="issue-id">${i.id}</span>
        <span class="severity-badge ${sevCls}">${sevLabel}</span>
        <span class="issue-title">${i.title}${fixedTag}</span>
        <span class="issue-file">${i.file.split('/').pop()}</span>
        <span class="issue-chevron">&#9654;</span>
      </div>
      <div class="issue-detail">
        <div class="detail-grid">
          <div class="detail-block">
            <h4>Technical</h4>
            <p>${i.technical}</p>
          </div>
          <div class="detail-block">
            <h4>Plain English</h4>
            <p>${i.plain}</p>
          </div>
        </div>
        <div class="detail-block" style="margin-top:0.8rem;">
          <h4>${i.status === 'fixed' ? 'Fix Applied' : 'Suggested Fix'}</h4>
          <p>${i.fix}</p>
        </div>
        <div class="detail-meta">
          <span class="detail-chip">&#128193; ${i.source}</span>
          <span class="detail-chip">&#128196; ${i.file}</span>
          <span class="detail-chip">&#9881; Phase ${i.phase}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleIssue(id) {
  const row = document.querySelector(`.issue-row[data-id="${id}"]`);
  if (row) row.classList.toggle('expanded');
}

// Search
document.getElementById('searchBox').addEventListener('input', (e) => {
  searchQuery = e.target.value;
  renderIssues();
});

// Init
renderStats();
renderDonut();
renderCatBars();
renderPhases();
renderFilters();
renderIssues();
</script>
</body>
</html>
